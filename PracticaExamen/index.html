<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Examen DAW - Desarrollo Cliente</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; background: #f4f4f4; }
        #app { background: white; padding: 20px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #messages { margin-top: 15px; min-height: 20px; color: #444; font-style: italic; }
        form { display: grid; gap: 15px; }
        .valido { border: 2px solid green; outline: none; }
        .invalido { border: 2px solid red; outline: none; }
        button { cursor: pointer; background: #007bff; color: white; border: none; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <main id="app">
        </main>

    <div id="messages"></div>

    <script src="script.js"></script>
</body>
</html>
